<!DOCTYPE html>
<html>
<head>
    <title>AI Medical Triage Bot</title>
<style>
    body {
        font-family: "Segoe UI", Arial, sans-serif;
        background: linear-gradient(135deg, #74ebd5, #acb6e5);
        padding: 40px;
    }

    .box {
        background: white;
        padding: 30px;
        max-width: 520px;
        margin: auto;
        border-radius: 14px;
        box-shadow: 0 15px 30px rgba(0,0,0,0.15);
    }

    h2 {
        text-align: center;
        color: #333;
        margin-bottom: 20px;
    }

    label {
        font-weight: 600;
        color: #444;
    }

    textarea, input, select {
        width: 100%;
        padding: 10px;
        margin-top: 6px;
        border-radius: 6px;
        border: 1px solid #ccc;
        font-size: 14px;
    }

    button {
        margin-top: 20px;
        padding: 12px;
        width: 100%;
        background: #007bff;
        color: white;
        font-size: 16px;
        font-weight: bold;
        border: none;
        border-radius: 8px;
        cursor: pointer;
    }

    button:hover {
        background: #0056b3;
    }

    .result {
        margin-top: 25px;
        padding: 15px;
        border-radius: 8px;
        font-size: 16px;
        background: #f4f6f8;
    }
</style>    
</head>
<body>

<div class="box">
    <h2>🩺 AI Emergency Triage Bot</h2>

    <form method="POST">
        <label>Symptoms:</label>
        <textarea name="symptoms" required></textarea><br><br>

        <label>Age:</label>
        <input type="number" name="age" required><br><br>

        <label>Medical History:</label>
        <select name="history">
            <option value="no">No</option>
            <option value="yes">Yes</option>
        </select><br><br>

        <button type="submit">Check Priority</button>
    </form>

    {% if result %}
    <div class="result">
        <strong>Priority Level:</strong> {{ result }} <br><br>
        <strong>Advice:</strong> {{ advice }}
    </div>
    {% endif %}

    <p style="margin-top:15px;font-size:12px;color:gray;">
        ⚠️ This tool assists in prioritization only. Not a medical diagnosis.
    </p>
</div>

</body>
</html>
